project_id = "local-community-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:4321"
additional_redirect_urls = ["http://127.0.0.1:4321/auth/confirm", "http://localhost:4321/auth/confirm", "https://braga-ai-builders.vercel.app/auth/confirm"]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "60s"
otp_length = 6
otp_expiry = 3600

[functions.request-invite-magic-link]
verify_jwt = false

[functions.anonymous-ideas]
verify_jwt = false

[functions.bug-reports]
verify_jwt = false
